services:
  - type: web
    name: radegast-backend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: OG_RPC
        value: https://evmrpc-testnet.0g.ai
      - key: PRIVATE_KEY
        sync: false
      - key: USDC_ADDRESS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

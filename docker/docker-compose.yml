services:
  ai:
    build: { context: ../ai, dockerfile: Dockerfile }
    ports: ["8000:8000"]
    env_file: ../.env
  frontend:
    build: { context: ../frontend, dockerfile: Dockerfile }
    ports: ["3000:3000"]
    env_file: ../.env
  caddy:
    image: caddy:2-alpine
    ports: ["80:80","443:443"]
    volumes: ["./Caddyfile:/etc/caddy/Caddyfile"]
